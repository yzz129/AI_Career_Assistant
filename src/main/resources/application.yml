server:
  port: 8080

spring:
  application:
    name: internai-career-assistant
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/internai_career?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: internai-career-assistant-demo-secret-key-please-change-in-prod
  expire-hours: 24

ai:
  api-key:
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini
  mock: true
