server:
  port: 8088

spring:
  application:
    name: internai-career-assistant
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/internai_career?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: internai-career-assistant-demo-secret-key-please-change-in-prod
  expire-hours: 24

ai:
  api-key: sk-4b8d9a8b0e7c49939807eb0c02bea494
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  mock: ${AI_MOCK:false}
  thinking-enabled: ${DEEPSEEK_THINKING_ENABLED:false}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:1024}
